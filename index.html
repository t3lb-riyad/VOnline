<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Menu | RTB MITS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="config.js" as="script">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root {
  --color-bg: #f2f2f7;
  --color-surface: #ffffff;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #6b6b6b;
  --color-text-tertiary: #999999;
  --color-accent: #b8860b;
  --color-accent-dark: #8b6914;
  --color-price: #2d7d46;
  --color-border: #e8e4de;
  --shadow: 0 4px 16px #00000030;
  --color-success: #2d7d46;
  --color-error: #c0392b;
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --header-height: 56px;
  --radius-sm: 8px;
  --radius-md: 7px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --transition-fast: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-med: 350ms cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-text-primary);
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: 16px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; }
ul { list-style: none; }

.container { padding: 0 16px; max-width: 600px; margin: 0 auto; }

.menu-header {
  position: relative;
  background: var(--color-bg);
  padding: 8px 16px;
  border-bottom: 1px solid var(--color-border);
}
.menu-header__inner {
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}
.menu-header__logo-link {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 0;
  text-decoration: none;
}
.menu-header__logo {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}
.header-center-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  margin: 0 auto;
}
.menu-header__title {
  font-family: var(--font-heading);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--color-text-primary);
  letter-spacing: 0.3px;
  line-height: 1.2;
}
.menu-header__table {
  font-size: 0.65rem;
  font-weight: 600;
  color: #fff;
  background: var(--color-accent);
  padding: 2px 10px;
  border-radius: 100px;
  margin-top: 2px;
  display: inline-block;
}
.menu-header__change-table {
  font-size: 0.6rem;
  font-weight: 500;
  color: var(--color-text-tertiary);
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: 100px;
  padding: 2px 10px;
  margin-top: 4px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: color var(--transition-fast), border-color var(--transition-fast);
  font-family: var(--font-body);
  line-height: 1.4;
}
.menu-header__change-table:hover {
  color: var(--color-accent);
  border-color: var(--color-accent);
}
.menu-header__change-table:active {
  opacity: 0.7;
}
.hidden { display: none !important; }

.tabs,
.category-menu-row {
  background-color: rgba(242, 242, 247, 0.72);
  backdrop-filter: blur(20px) saturate(190%);
  -webkit-backdrop-filter: blur(20px) saturate(190%);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
  display: flex;
  justify-content: center;
  flex-wrap: nowrap;
  overflow-x: auto;
  gap: 20px;
  padding: 12px 16px;
  align-items: center;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
@media (max-width: 768px) {
  .tabs,
  .category-menu-row {
    justify-content: flex-start;
  }
}
.tabs::-webkit-scrollbar,
.category-menu-row::-webkit-scrollbar { display: none; }
.tabs__list {
  display: flex;
  gap: 20px;
  align-items: center;
}
.category-tab {
  position: relative;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  color: var(--color-accent) !important;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 8px 18px;
  white-space: nowrap;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.category-tab:not(.active)::before,
.category-tab:not(.active)::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 8px;
  height: 100%;
  pointer-events: none;
  box-sizing: border-box;
}
.category-tab:not(.active)::before {
  left: 0;
  border-top: 2px solid var(--color-accent);
  border-bottom: 2px solid var(--color-accent);
  border-left: 2px solid var(--color-accent);
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
  -webkit-mask-image: linear-gradient(to bottom, black 25%, transparent 25%, transparent 75%, black 75%);
  mask-image: linear-gradient(to bottom, black 25%, transparent 25%, transparent 75%, black 75%);
}
.category-tab:not(.active)::after {
  right: 0;
  border-top: 2px solid var(--color-accent);
  border-bottom: 2px solid var(--color-accent);
  border-right: 2px solid var(--color-accent);
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
  -webkit-mask-image: linear-gradient(to bottom, black 25%, transparent 25%, transparent 75%, black 75%);
  mask-image: linear-gradient(to bottom, black 25%, transparent 25%, transparent 75%, black 75%);
}
.category-tab.active {
  background-color: var(--color-accent) !important;
  color: #FFFFFF !important;
  font-weight: 600;
  border-radius: 12px;
  padding: 8px 18px;
  box-shadow: 0px 2px 6px hwb(35 11% 27% / 0.24) !important;
}
.category-tab.active::before,
.category-tab.active::after {
  display: none !important;
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 16px 90px;
  max-width: 600px;
  margin: 0 auto;
}

.menu-card {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transform: translateZ(0);
  will-change: transform;
  display: flex;
  flex-direction: column;
  font-family: 'Cairo', sans-serif;
}
.menu-card:active { transform: scale(0.97); }
.menu-card__img {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  background: #e8e4de;
  flex-shrink: 0;
}
.menu-card__body {
  padding: 12px 14px 6px;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 120px;
}
.menu-card__bottom {
  margin-top: auto;
}
.menu-card__name {
  font-family: var(--font-heading);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--color-text-primary);
  line-height: 1.3;
  margin-bottom: 2px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.menu-card__footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  margin-bottom: 8px;
  position: relative;
}
.menu-card__divider {
  border: none;
  border-top: 1px solid var(--color-border);
  margin: 0 0 2px;
}
.menu-card__show-more {
  display: block;
  background: none;
  border: none;
  padding: 0;
  margin: 0 0 4px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--color-text-tertiary);
  cursor: pointer;
  text-align: center;
  text-underline-offset: 2px;
  text-decoration-color: rgba(153, 153, 153, 0.3);
  transition: color var(--transition-fast);
  font-family: var(--font-family);
}
.menu-card__show-more:hover {
  color: var(--color-text-secondary);
}
.menu-card__price {
  font-size: 1rem;
  font-weight: 700;
  color: #15803d;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding-right: 6px;
}
.menu-card__add {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  background: none;
  border: none;
  color: var(--color-text-tertiary);
  font-size: 1.2rem;
  font-weight: 400;
  line-height: 1;
  cursor: pointer;
  transition: color var(--transition-fast);
  flex-shrink: 0;
}
.menu-card:hover .menu-card__add,
.menu-card__add:hover,
.menu-card__add:focus-visible {
  color: #000000;
}
.menu-card__add:active { opacity: 0.6; }
.menu-card__badge {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 4px;
  color: #fff;
}
.menu-card__badge--bestseller { background: rgba(188, 57, 47, 0.82); backdrop-filter: blur(4px); border-radius: 6px; }
.menu-card__badge--chef { background: rgba(21, 128, 61, 0.82); backdrop-filter: blur(4px); border-radius: 6px; }
.menu-card__img-wrap {
  position: relative;
  overflow: hidden;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 16px;
  color: var(--color-text-tertiary);
}
.empty-state__text { font-size: 0.9rem; }

.order-banner {
  position: fixed;
  bottom: 24px;
  left: 16px;
  right: 16px;
  max-width: 500px;
  margin: 0 auto;
  background: var(--color-surface);
  border-radius: 24px;
  padding: 16px 20px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  transform: translateY(calc(100% + 40px));
  transition: transform var(--transition-med);
}
.order-banner--visible { transform: translateY(0); }
.order-banner__left {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;
  flex: 1;
}
.order-banner__thumbs {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: visible;
  padding-top: 12px;
  padding-bottom: 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.order-banner__thumbs::-webkit-scrollbar { display: none; }
.order-banner__thumb {
  position: relative;
  width: 44px;
  height: 44px;
  flex-shrink: 0;
  border: 2px solid var(--color-border);
  border-radius: 10px;
  background: var(--color-bg);
  cursor: pointer;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}
.order-banner__thumb:active { transform: scale(0.92); }
.order-banner__thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
  border-radius: 10px;
}
.order-banner__thumb-remove {
  position: absolute;
  top: -10px;
  right: -10px;
  z-index: 10;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  color: var(--color-accent);
  border: none;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  padding: 0;
  pointer-events: none;
}
.order-banner__thumb-qty {
  position: absolute;
  bottom: 0;
  right: 0;
  z-index: 10;
  background: var(--color-accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 4px 0 0 0;
  line-height: 1.3;
  white-space: nowrap;
  pointer-events: none;
}
.order-banner__info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.order-banner__cta {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--color-accent);
  line-height: 1.3;
}
.order-banner__count {
  font-size: 0.75rem;
  color: var(--color-text-tertiary);
  line-height: 1.3;
}
.order-banner__send {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--color-accent);
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px #b9711459;
  cursor: pointer;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  flex-shrink: 0;
  align-self: center;
}
.order-banner__send:active { transform: scale(0.92); }
.order-banner__send svg { width: 22px; height: 22px; }

#btn-track-live-order:hover { opacity: 0.9; }
.order-modal--visible ~ #btn-track-live-order,
body:has(.order-modal--visible) #btn-track-live-order { opacity: 0; visibility: hidden; pointer-events: none; }

.menu-card__qty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  box-shadow: none;
}
.vertical-counter-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-75%);
}
.vertical-counter-controls .plus-btn,
.vertical-counter-controls .minus-btn {
  background: transparent;
  border: none;
  color: #000000;
  font-size: 1.1rem;
  font-weight: 600;
  line-height: 1;
  padding: 2px 0;
  cursor: pointer;
  width: auto;
  height: auto;
  border-radius: 0;
}
.vertical-counter-controls .quantity-value {
  font-size: 1rem;
  font-weight: 700;
  color: #000000;
  line-height: 1;
  min-width: auto;
}
.menu-card__qty-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: none;
  color: #000000;
  font-size: 0.85rem;
  font-weight: 500;
  background: transparent;
  transition: opacity var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
  line-height: 1;
}
.menu-card__qty-btn--minus:active { opacity: 0.5; transform: scale(0.92); }
.menu-card__qty-btn--plus {
  color: #000000;
  background: transparent;
  border: none;
}
.menu-card__qty-btn--plus:active { opacity: 0.5; transform: scale(0.92); }
.menu-card__qty-val {
  font-size: 0.85rem;
  font-weight: 600;
  min-width: 20px;
  text-align: center;
  color: var(--color-text-primary);
}
.order-modal {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-med);
}
.order-modal--visible { opacity: 1; pointer-events: auto; }
.order-modal--fade-out { opacity: 0; pointer-events: none; }
.track-btn--fade-out { opacity: 0; transform: scale(0.8); pointer-events: none; }
#btn-track-live-order { transition: opacity 0.3s ease, transform 0.3s ease; }
.order-modal__sheet {
  width: 100%;
  max-width: 500px;
  max-height: 80vh;
  max-height: 80dvh;
  background: var(--color-surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 28px 24px 36px;
  transform: translateY(100%);
  transition: transform var(--transition-med) cubic-bezier(0.32, 0.72, 0, 1);
  overflow-y: auto;
  position: relative;
  z-index: 10000;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
}
.order-modal--visible .order-modal__sheet { transform: translateY(0); }
.order-modal__title {
  font-family: var(--font-heading);
  font-size: 1.2rem;
  font-weight: 600;
  text-align: center;
  margin-bottom: 4px;
}
.order-modal__subtitle {
  text-align: center;
  font-size: 0.8rem;
  color: var(--color-text-secondary);
  margin-bottom: 20px;
}
.order-modal__table-num {
  font-weight: 700;
  color: var(--color-accent);
}

.steps {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 20px 0 24px;
  padding: 0 8px;
}
.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
}
.step__circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 600;
  border: 2px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text-tertiary);
  transition: all var(--transition-med);
  position: relative;
  z-index: 2;
}
.step--active .step__circle {
  border-color: var(--color-accent);
  background: var(--color-accent);
  color: #fff;
  box-shadow: var(--shadow);
}
.step--done .step__circle {
  border-color: var(--color-success);
  background: var(--color-success);
  color: #fff;
}
.step__label {
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--color-text-tertiary);
  margin-top: 6px;
  text-align: center;
  white-space: nowrap;
}
.step--active .step__label { color: var(--color-accent); font-weight: 600; }
.step--done .step__label { color: var(--color-success); }
.step__line {
  position: absolute;
  top: 20px;
  left: calc(50% + 20px);
  right: calc(-50% + 20px);
  height: 2px;
  background: var(--color-border);
  z-index: 1;
  transform: translateY(-50%);
}
.step:last-child .step__line { display: none; }
.step--done .step__line { background: var(--color-success); }
.step--active .step__line { background: linear-gradient(90deg, var(--color-accent), var(--color-border)); }

.w-4 { width: 16px; }
.h-4 { height: 16px; }
.inline-block { display: inline-block; }
.animate-bounce {
  animation: bounce 1.5s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

.ready-utensils-animated {
  animation: shake-swing 0.7s ease-in-out infinite;
}
@keyframes shake-swing {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-12deg); }
  50% { transform: rotate(12deg); }
  75% { transform: rotate(-6deg); }
}

.opacity-50 { opacity: 0.5; }

.order-details {
  background: var(--color-bg);
  border-radius: var(--radius-md);
  padding: 20px;
  margin: 20px 0;
}
.order-details__row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 0.85rem;
}
.order-details__row--total {
  border-top: 1px solid var(--color-border);
  margin-top: 6px;
  padding-top: 10px;
  font-weight: 700;
  font-size: 0.9rem;
}
.order-details__label { color: var(--color-text-secondary); }
.order-details__value { color: var(--color-text-primary); font-weight: 500; }
.order-details__section-title {
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--color-accent); margin-bottom: 8px;
}
.new-additions {
  background: var(--color-bg);
  border-radius: var(--radius-md);
  padding: 16px;
  margin: 0 0 16px 0;
  border: 1px solid var(--color-border);
}
.new-additions__status {
  font-size: 0.7rem; color: var(--color-text-tertiary); margin-bottom: 8px;
}

.order-modal__cancelled {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 0 12px;
  text-align: center;
}
.order-modal__cancelled--visible {

  function getCurrentLocalTime() {
    try {
      var opts = { timeZone: 'Africa/Algiers', hour: '2-digit', minute: '2-digit', hour12: false };
      var parts = new Intl.DateTimeFormat('en-US', opts).formatToParts(new Date());
      var h, m;
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].type === 'hour') h = parseInt(parts[i].value, 10);
        if (parts[i].type === 'minute') m = parseInt(parts[i].value, 10);
      }
      if (h !== undefined && m !== undefined) return { hours: h, minutes: m };
    } catch (e) {  }
    var d = new Date();
    return { hours: d.getHours(), minutes: d.getMinutes() };
  }

  function isTimeBetween(currentH, currentM, openH, openM, closeH, closeM) {
    var cur = currentH * 60 + currentM;
    var open = openH * 60 + openM;
    var close = closeH * 60 + closeM;
    if (close > open) {
      return cur >= open && cur < close;
    }
    return cur >= open || cur < close;
  }

  function checkKitchenHours() {
    fetchOperatingHours().then(function (hours) {
      var now = getCurrentLocalTime();
      var openParts = (hours.opening_time || '12:00').split(':');
      var closeParts = (hours.closing_time || '23:30').split(':');
      var openH = parseInt(openParts[0], 10);
      var openM = parseInt(openParts[1], 10);
      var closeH = parseInt(closeParts[0], 10);
      var closeM = parseInt(closeParts[1], 10);

      var isOpen = isTimeBetween(now.hours, now.minutes, openH, openM, closeH, closeM);
      if (!isOpen) {
        showKitchenClosedWall(hours);
      }
    }).catch(function (err) {
      console.warn('Kitchen hours check error:', err);

  function verifySession(tableNum) {
    if (!tableNum || tableNum < 1) return;

    var stored = getStoredSessionToken(tableNum);

    if (!stored) {
      fetchLiveSessionToken(tableNum).then(function (live) {
        if (live) setStoredSessionToken(tableNum, live.token);
      }).catch(function () {});
      return;
    }

    fetchLiveSessionToken(tableNum).then(function (live) {
      if (live && live.token !== stored) {
        showSessionWall();
      }
    }).catch(function (err) {
      console.warn('Session verify error:', err);

  function startSessionPolling() {
    var tn = state.tableNumber;
    if (!tn || tn < 1) return;
    if (!SUPABASE_CLIENT) return;

    function poll() {
      var stored = getStoredSessionToken(tn);
      if (!stored) return;

      SUPABASE_CLIENT
        .from('restaurant_tables')
        .select('current_session_token')
        .eq('table_number', tn)
        .single()
        .then(function (res) {
          if (res.error) return;
          var liveToken = res.data && res.data.current_session_token;
          if (liveToken && liveToken !== stored) {
            showSessionWall();
          }
        })
        .catch(function () {});
    }

    poll();
    setInterval(poll, 5000);
  }

  function initSession(tableNum) {
    if (!tableNum || tableNum < 1) return;

    fetchLiveSessionToken(tableNum).then(function (live) {
      if (!live) return;

      var blockedKey = 'table_locked_' + tableNum;
      var urlToken = getTokenFromURL();

      if (urlToken) {
        if (urlToken === live.token) {
          try { localStorage.removeItem(blockedKey); } catch (e) {}
          setStoredSessionToken(tableNum, live.token);
        } else {
          showSessionWall();
        }
        return;
      }

      var stored = getStoredSessionToken(tableNum);

      if (!stored) {
        setStoredSessionToken(tableNum, live.token);
        try { localStorage.removeItem(blockedKey); } catch (e) {}
        return;
      }

      if (stored !== live.token) {
        var checkUrl = SUPABASE_URL + '/rest/v1/' + SUPABASE_ORDERS_TABLE +
          '?table_number=eq.' + tableNum +
          '&status=neq.paid' +
          '&status=neq.cancelled' +
          '&select=order_id';
        supabaseFetch(checkUrl)
        .then(function (r) { return r.json(); })
        .then(function (activeOrders) {
          if (Array.isArray(activeOrders) && activeOrders.length > 0) {
            showSessionWall();
          } else {
            setStoredSessionToken(tableNum, live.token);
            try { localStorage.removeItem(blockedKey); } catch (e) {}
          }
        })
        .catch(function () {
          showSessionWall();
        });
        return;
      }

      try { localStorage.removeItem(blockedKey); } catch (e) {}
    }).catch(function (err) {
      console.warn('Session init error:', err);
    });
  }

  function fetchWithTimeout(url, options, timeoutMs) {
    var controller = new AbortController();
    var timer = setTimeout(function () { controller.abort(); }, timeoutMs || 8000);
    return fetch(url, Object.assign({}, options, { signal: controller.signal }))
      .then(function (res) { clearTimeout(timer); return res; })
      .catch(function (err) { clearTimeout(timer); throw err; });

  function normalizeItemBooleans(items) {
    return (items || []).map(function (item) {
      item.is_best_seller = item.is_best_seller === true || item.is_best_seller === 'true' || item.is_best_seller === 't';
      item.is_chef_special = item.is_chef_special === true || item.is_chef_special === 'true' || item.is_chef_special === 't';
      return item;
    });
  }

  function renderTabs() {
    var tabDefs = [
      { key: 'all', label: 'Tout', labelAr: 'الكل' },
      { key: 'bestsellers', label: 'Meilleures ventes', labelAr: 'الأكثر مبيعاً' },
      { key: 'chefspecials', label: 'Spécialités du chef', labelAr: 'توجيهات الشيف' },
    ];

    (state.categories || []).forEach(function (cat) {
      var slug = cat.name.toLowerCase().replace(/\s+/g, '');
      tabDefs.push({ key: slug, label: cat.name, labelAr: '' });
    });

    var html = '';
    tabDefs.forEach(function (t, i) {
      var activeClass = (i === 0) ? ' active' : '';
      html += '<button class="category-tab' + activeClass + '" data-tab="' + t.key + '" role="tab" aria-selected="' + (i === 0) + '">' +
        t.label +
      '</button>';
    });
    dom.tabsList.innerHTML = html;

    dom.tabsList.querySelectorAll('.category-tab').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        var tab = btn.getAttribute('data-tab');
        setActiveTab(tab);
      });

  function setActiveTab(tabKey) {
    state.activeTab = tabKey;

    dom.tabsList.querySelectorAll('.category-tab').forEach(function (btn) {
      var isActive = btn.getAttribute('data-tab') === tabKey;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive);

    applyActiveFilter();

  function filterMenuItems(tab) {
    var items = state.menuItems;
    if (tab === 'all') {
      return items;
    }
    if (tab === 'bestsellers') {
      return items.filter(function (i) { return i.is_best_seller === true; });
    }
    if (tab === 'chefspecials') {
      return items.filter(function (i) { return i.is_chef_special === true; });
    }
    return items.filter(function (i) {
      var activeCat = (tab || '').toLowerCase().trim();
      var itemCat = (i.category || '').toLowerCase().trim();
      if (itemCat === activeCat) return true;
      if (i.secondary_category && i.secondary_category.toLowerCase().trim() === activeCat) return true;
      return false;
    });
  }

  function applyActiveFilter() {
    state.filteredItems = filterMenuItems(state.activeTab);
    renderMenu(state.filteredItems);
  }

  function renderMenu(items) {
    if (!items || items.length === 0) {
      dom.menuGrid.innerHTML = '<div class="empty-state"><p class="empty-state__text">Aucun article disponible dans cette section.</p></div>';
      return;
    }

    var html = '';
    items.forEach(function (item) {
      var imgSrc = item.image_url && item.image_url.trim() !== ''
        ? item.image_url
        : ''; 

      var badges = '';
      if (item.is_best_seller) {
        badges += '<span class="menu-card__badge menu-card__badge--bestseller">Meilleure vente</span>';
      } else if (item.is_chef_special) {
        badges += '<span class="menu-card__badge menu-card__badge--chef">Spécialité du chef</span>';
      }

      var cartQty = state.cart.reduce(function (sum, c) { return c.id === item.id ? c.quantity : sum; }, 0);
      var qtyControls = cartQty > 0
        ? '<div class="menu-card__qty vertical-counter-controls">' +
            '<button class="menu-card__qty-btn menu-card__qty-btn--plus plus-btn" data-id="' + item.id + '" aria-label="Augmenter la quantité">+</button>' +
            '<span class="menu-card__qty-val quantity-value">' + cartQty + '</span>' +
            '<button class="menu-card__qty-btn menu-card__qty-btn--minus minus-btn" data-id="' + item.id + '" aria-label="Diminuer la quantité">-</button>' +
          '</div>'
        : '<button class="menu-card__add" data-id="' + item.id + '" aria-label="Ajouter ' + escapeHtml(item.name) + ' à la commande">+</button>';

      html +=
        '<div class="menu-card" data-id="' + item.id + '">' +
          '<div class="menu-card__img-wrap">' +
            '<img class="menu-card__img" src="' + imgSrc + '" alt="' + escapeHtml(item.name) + '" loading="lazy">' +
            badges +
          '</div>' +
          '<div class="menu-card__body">' +
            '<h3 class="menu-card__name">' + escapeHtml(item.name) + '</h3>' +
            '<div class="menu-card__footer">' +
              '<span class="menu-card__price">' + formatPrice(item.price) + ' DA</span>' +
              qtyControls +
            '</div>' +
            (item.description ? '<div class="menu-card__bottom"><hr class="menu-card__divider"><button class="menu-card__show-more" data-id="' + item.id + '">voir plus</button></div>' : '') +
          '</div>' +
        '</div>';
    });
    dom.menuGrid.innerHTML = html;

    dom.menuGrid.querySelectorAll('.menu-card__add').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = parseInt(btn.getAttribute('data-id'), 10);
        addToCart(id);
      });
    });

    dom.menuGrid.querySelectorAll('.menu-card__qty-btn--plus').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = parseInt(btn.getAttribute('data-id'), 10);
        addToCart(id);
      });
    });

    dom.menuGrid.querySelectorAll('.menu-card__qty-btn--minus').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = parseInt(btn.getAttribute('data-id'), 10);
        updateCartQuantity(id, -1);
      });
    });

    dom.menuGrid.querySelectorAll('.menu-card').forEach(function (card) {
      card.addEventListener('click', function (e) {
        if (e.target.closest('.menu-card__qty-btn') || e.target.closest('.menu-card__add') || e.target.closest('.menu-card__qty-val') || e.target.closest('.menu-card__show-more')) return;
        var id = parseInt(card.getAttribute('data-id'), 10);

        if (state.isOrderPlaced && state.orderId) {
          if (state.orderStatus === 'received') {
            if (state.cart.length === 0 && state.lastOrder && state.lastOrder.items) {
              state.cart = state.lastOrder.items.map(function (i) {
                var menuItem = state.menuItems.find(function (m) { return Number(m.id) === Number(i.id); });
                return { id: i.id, name: i.name, nameAr: i.name_ar || '', price: i.price, quantity: Number(i.quantity), notes: i.notes || '', image_url: (menuItem && menuItem.image_url) || i.image_url || '' };
              });
              state.cart.forEach(function (item) { updateCardCounter(item.id); });
              updateBottomBar();
            }
          } else {
            if (!state.parentOrder && state.lastOrder) {
              state.parentOrder = JSON.parse(JSON.stringify(state.lastOrder));
              state.parentOrder.status = state.orderStatus || 'preparing';
            }
            state.orderId = null;
            state.isOrderPlaced = false;
            updateTrackButtonVisibility();
          }
          dom.orderModal.classList.remove('order-modal--visible');
          document.body.style.overflow = '';
        }

        addToCart(id);
      });
    });

    dom.menuGrid.querySelectorAll('.menu-card__show-more').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = parseInt(btn.getAttribute('data-id'), 10);
        var item = state.menuItems.find(function (i) { return i.id === id; });
        if (item) openItemModal(item);
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  var itemModal = {
    el: null,
    overlay: null,
    frame: null,
    closeBtn: null,
    track: null,
    images: [],
    currentIndex: 0,
    timer: null,
  };

  function createItemModal() {
    if (itemModal.el) return;

    var overlay = document.createElement('div');
    overlay.className = 'item-modal__overlay';

    var closeBtn = document.createElement('button');
    closeBtn.className = 'item-modal__close';
    closeBtn.innerHTML = '&times;';

    var track = document.createElement('div');
    track.className = 'carousel__track';

    var dots = document.createElement('div');
    dots.className = 'carousel__dots';

    var carousel = document.createElement('div');
    carousel.className = 'item-modal__carousel';
    carousel.appendChild(track);
    carousel.appendChild(dots);

    var title = document.createElement('h2');
    title.className = 'item-modal__title';

    var compTitle = document.createElement('h3');
    compTitle.className = 'item-modal__components-title';
    compTitle.textContent = 'Composants';

    var compList = document.createElement('ul');
    compList.className = 'item-modal__components-list';

    var body = document.createElement('div');
    body.className = 'item-modal__body';
    body.appendChild(title);
    body.appendChild(compTitle);
    body.appendChild(compList);

    var frame = document.createElement('div');
    frame.className = 'item-modal__frame';
    frame.appendChild(closeBtn);
    frame.appendChild(carousel);
    frame.appendChild(body);

    var el = document.createElement('div');
    el.className = 'item-modal';
    el.appendChild(overlay);
    el.appendChild(frame);
    document.body.appendChild(el);

    itemModal.el = el;
    itemModal.overlay = overlay;
    itemModal.frame = frame;
    itemModal.closeBtn = closeBtn;
    itemModal.track = track;
    itemModal.dots = dots;
    itemModal.title = title;
    itemModal.compList = compList;
    itemModal.carousel = carousel;

    closeBtn.addEventListener('click', closeItemModal);
    overlay.addEventListener('click', closeItemModal);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && itemModal.el && itemModal.el.classList.contains('item-modal--visible')) {
        closeItemModal();
      }
    });

    el.addEventListener('mouseenter', function () { stopCarousel(); });
    el.addEventListener('mouseleave', function () { startCarousel(); });
  }

  function openItemModal(item) {
    createItemModal();

    itemModal.title.textContent = item.name;

    var images = [];
    if (item.image_url && item.image_url.trim() !== '') {
      images.push(item.image_url);
    }
    if (Array.isArray(item.secondary_images_urls)) {
      item.secondary_images_urls.forEach(function (url) {
        if (url && url.trim() !== '' && images.indexOf(url) === -1) {
          images.push(url);
        }
      });
    }
    itemModal.images = images;
    itemModal.currentIndex = 0;

    itemModal.track.innerHTML = '';
    images.forEach(function (url, i) {
      var img = document.createElement('img');
      img.className = 'carousel__img';
      img.src = url;
      img.alt = item.name + ' image ' + (i + 1);
      img.loading = 'lazy';
      itemModal.track.appendChild(img);
    });

    itemModal.dots.innerHTML = '';
    images.forEach(function (_, i) {
      var dot = document.createElement('span');
      dot.className = 'carousel__dot' + (i === 0 ? ' carousel__dot--active' : '');
      dot.addEventListener('click', function () { goToSlide(i); });
      itemModal.dots.appendChild(dot);
    });

    updateCarousel();
    startCarousel();

    (function(){
      var el = itemModal.carousel;
      if (!el) return;
      var startX = 0, isDragging = false;
      el.querySelectorAll('img').forEach(function(img){
        img.addEventListener('dragstart',function(e){e.preventDefault()});
      });
      el.addEventListener('pointerdown',function(e){
        startX = e.clientX; isDragging = true; el.style.cursor = 'grabbing';
      });
      el.addEventListener('pointerup',function(e){
        if (!isDragging) return; isDragging = false; el.style.cursor = 'grab';
        var dx = startX - e.clientX;
        if (dx > 50 && itemModal.currentIndex < itemModal.images.length - 1) {
          navigateCarousel(1);
        } else if (dx < -50 && itemModal.currentIndex > 0) {
          navigateCarousel(-1);
        }
      });
      el.addEventListener('pointerleave',function(){
        if (isDragging) { isDragging = false; el.style.cursor = 'grab'; }
      });
    })();

    var components = parseComponents(item.description);
    itemModal.compList.innerHTML = '';
    if (components.length > 0) {
      components.forEach(function (comp) {
        var li = document.createElement('li');
        li.className = 'item-modal__component-item';
        li.textContent = comp;
        itemModal.compList.appendChild(li);
      });
      itemModal.compList.style.display = '';
    } else {
      itemModal.compList.style.display = 'none';
    }

    itemModal.el.classList.add('item-modal--visible');
    document.body.style.overflow = 'hidden';
  }

  function closeItemModal() {
    if (!itemModal.el) return;
    stopCarousel();
    itemModal.el.classList.remove('item-modal--visible');
    document.body.style.overflow = '';
  }

  function updateCarousel() {
    var offset = -itemModal.currentIndex * 100;
    itemModal.track.style.transform = 'translateX(' + offset + '%)';

    itemModal.dots.style.display = itemModal.images.length > 1 ? '' : 'none';

    var dots = itemModal.dots.querySelectorAll('.carousel__dot');
    dots.forEach(function (dot, i) {
      dot.classList.toggle('carousel__dot--active', i === itemModal.currentIndex);
    });
  }

  function navigateCarousel(dir) {
    stopCarousel();
    itemModal.currentIndex = (itemModal.currentIndex + dir + itemModal.images.length) % itemModal.images.length;
    updateCarousel();
    startCarousel();
  }

  function goToSlide(index) {
    stopCarousel();
    itemModal.currentIndex = index;
    updateCarousel();
    startCarousel();
  }

  function startCarousel() {
    stopCarousel();
    if (itemModal.images.length <= 1) return;
    itemModal.timer = setInterval(function () {
      itemModal.currentIndex = (itemModal.currentIndex + 1) % itemModal.images.length;
      updateCarousel();
    }, 3000);
  }

  function stopCarousel() {
    if (itemModal.timer) {
      clearInterval(itemModal.timer);
      itemModal.timer = null;
    }
  }

  function parseComponents(desc) {
    if (!desc) return [];
    var parts = desc.split(/\n|,\s*/);
    return parts.map(function (p) { return p.trim(); }).filter(function (p) { return p.length > 0; });
  }

  function addToCart(itemId) {
    var item = state.menuItems.find(function (i) { return i.id === itemId; });
    if (!item) return;

    var existing = state.cart.find(function (c) { return c.id === itemId; });
    if (existing) {
      existing.quantity += 1;
    } else {
      state.cart.push({
        id: item.id,
        name: item.name,
        nameAr: item.name_ar || '',
        price: item.price,
        quantity: 1,
        notes: '',
        image_url: item.image_url || '',
      });
    }

    updateCardCounter(itemId);
    updateBottomBar();
  }

  function updateCartQuantity(itemId, delta) {
    var existing = state.cart.find(function (c) { return c.id === itemId; });
    if (!existing) return;

    existing.quantity += delta;
    if (existing.quantity <= 0) {
      state.cart = state.cart.filter(function (c) { return c.id !== itemId; });
    }

    updateCardCounter(itemId);
    updateBottomBar();
  }

  function updateCartNotes(itemId, notes) {
    var existing = state.cart.find(function (c) { return c.id === itemId; });
    if (!existing) return;
    existing.notes = notes;
  }

  function updateCardCounter(itemId) {
    var card = dom.menuGrid.querySelector('.menu-card[data-id="' + itemId + '"]');
    if (!card) return;
    var footer = card.querySelector('.menu-card__footer');
    if (!footer) return;
    var cartItem = state.cart.find(function (c) { return c.id === itemId; });
    var qty = cartItem ? cartItem.quantity : 0;
    var existingQty = footer.querySelector('.menu-card__qty');
    var existingAdd = footer.querySelector('.menu-card__add');
    if (qty > 0) {
      if (existingQty) {
        existingQty.querySelector('.menu-card__qty-val').textContent = qty;
        return;
      }
      if (existingAdd) existingAdd.remove();
      var div = document.createElement('div');
      div.className = 'menu-card__qty vertical-counter-controls';
      div.innerHTML =
        '<button class="menu-card__qty-btn menu-card__qty-btn--plus plus-btn" data-id="' + itemId + '" aria-label="Augmenter la quantité">+</button>' +
        '<span class="menu-card__qty-val quantity-value">' + qty + '</span>' +
        '<button class="menu-card__qty-btn menu-card__qty-btn--minus minus-btn" data-id="' + itemId + '" aria-label="Diminuer la quantité">-</button>';
      footer.appendChild(div);
      div.querySelector('.menu-card__qty-btn--plus').addEventListener('click', function (e) { e.stopPropagation(); addToCart(itemId); });
      div.querySelector('.menu-card__qty-btn--minus').addEventListener('click', function (e) { e.stopPropagation(); updateCartQuantity(itemId, -1); });
    } else {
      if (existingQty) existingQty.remove();
      if (!existingAdd) {
        var item = state.menuItems.find(function (i) { return i.id === itemId; });
        var btn = document.createElement('button');
        btn.className = 'menu-card__add';
        btn.setAttribute('data-id', itemId);
        btn.setAttribute('aria-label', 'Ajouter ' + (item ? item.name : '') + ' à la commande');
        btn.textContent = '+';
        btn.addEventListener('click', function (e) { e.stopPropagation(); addToCart(itemId); });
        footer.appendChild(btn);
      }
    }
  }

  function calcCartTotal() {
    var total = 0;
    state.cart.forEach(function (c) { total += c.price * c.quantity; });
    return total;
  }

  function renderOrderBannerThumbs() {
    var container = dom.orderBannerThumbs;
    container.innerHTML = '';
    state.cart.forEach(function (item) {
      var thumb = document.createElement('div');
      thumb.className = 'order-banner__thumb';
      thumb.setAttribute('role', 'button');
      thumb.setAttribute('tabindex', '0');
      thumb.setAttribute('aria-label', 'Retirer ' + item.name);

      var img = document.createElement('img');
      img.src = item.image_url || getFallbackImage();
      img.onerror = function () { this.src = getFallbackImage(); this.onerror = null; };
      img.alt = item.name;
      img.draggable = false;
      thumb.appendChild(img);

      var removeBadge = document.createElement('span');
      removeBadge.className = 'order-banner__thumb-remove';
      removeBadge.textContent = '\u2212';
      thumb.appendChild(removeBadge);

      var qtyBadge = document.createElement('span');
      qtyBadge.className = 'order-banner__thumb-qty';
      qtyBadge.textContent = 'x' + item.quantity;
      thumb.appendChild(qtyBadge);

      thumb.addEventListener('click', function () {
        updateCartQuantity(item.id, -1);
      });

      container.appendChild(thumb);
    });
  }

  function updateBottomBar() {
    var count = state.cart.reduce(function (sum, c) { return sum + c.quantity; }, 0);
    var total = calcCartTotal();
    dom.orderBannerCta.textContent = count > 0 ? 'Commander' : '';
    dom.orderBannerCount.textContent = count > 0
      ? count + ' article' + (count !== 1 ? 's' : '') + ' \u00B7 ' + formatPrice(total) + ' ' + CURRENCY_SYMBOL
      : '';
    renderOrderBannerThumbs();
    dom.orderBanner.classList.toggle('order-banner--visible', count > 0);
    document.body.style.paddingBottom = count > 0 ? '130px' : '16px';
  }

  function updateOrderDisplay() {
    if (!state.lastOrder) return;
    var total = state.lastOrder.total || calcCartTotal();

    if (state.parentOrder) {
      var parentHtml = '';
      (state.parentOrder.items || []).forEach(function (c) {
        parentHtml +=
          '<div class="order-details__row">' +
            '<span class="order-details__label">' + c.quantity + 'x ' + escapeHtml(c.name) + '</span>' +
            '<span class="order-details__value">' + formatPrice(c.price * c.quantity) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
      });
      dom.orderDetailsSummary.innerHTML =
        '<div class="order-details__section-title">Commande originale</div>' +
        parentHtml +
        '<div class="order-details__row order-details__row--total">' +
          '<span class="order-details__label">Total</span>' +
          '<span class="order-details__value">' + formatPrice(state.parentOrder.total) + ' ' + CURRENCY_SYMBOL + '</span>' +
        '</div>';

      var childHtml = '';
      (state.lastOrder.items || []).forEach(function (c) {
        childHtml +=
          '<div class="order-details__row">' +
            '<span class="order-details__label">' + c.quantity + 'x ' + escapeHtml(c.name) + '</span>' +
            '<span class="order-details__value">' + formatPrice(c.price * c.quantity) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
      });
      var newAdditionsEl = document.getElementById('newAdditionsSection');
      if (newAdditionsEl) {
        newAdditionsEl.innerHTML =
          '<div class="order-details__section-title">Nouveaux ajouts</div>' +
          '<div class="new-additions__status">Statut : Reçue</div>' +
          childHtml +
          '<div class="order-details__row order-details__row--total">' +
            '<span class="order-details__label">Total des ajouts</span>' +
            '<span class="order-details__value">' + formatPrice(total) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
        newAdditionsEl.style.display = 'block';
      }
    } else {
      var itemsHtml = '';
      (state.lastOrder.items || []).forEach(function (c) {
        itemsHtml +=
          '<div class="order-details__row">' +
            '<span class="order-details__label">' + c.quantity + 'x ' + escapeHtml(c.name) + '</span>' +
            '<span class="order-details__value">' + formatPrice(c.price * c.quantity) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
      });
      dom.orderDetailsSummary.innerHTML =
        itemsHtml +
        '<div class="order-details__row order-details__row--total">' +
          '<span class="order-details__label">Total</span>' +
          '<span class="order-details__value">' + formatPrice(total) + ' ' + CURRENCY_SYMBOL + '</span>' +
        '</div>';
    }
  }

  function postNewOrder(ordersUrl, payload) {
    return supabaseFetch(ordersUrl, {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify(payload),
    })
    .then(function (res) { if (!res.ok) throw new Error('Insert failed'); return res.json(); })
    .then(function (data) {
      var row = Array.isArray(data) ? data[0] : data;
      var realId = row.id;
      return supabaseFetch(ordersUrl + '?id=eq.' + realId, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({ order_id: String(realId) }),
      }).then(function () { return String(realId); });
    });
  }

  function confirmOrder() {
    if (state.cart.length === 0 || state.isSubmitting) return;
    state.isSubmitting = true;

    var total = calcCartTotal();
    var timestamp = new Date().toISOString();
    var tempId = 'tmp-' + Date.now();

    var orderItems = state.cart.map(function (c) {
      return { id: c.id, name: c.name, quantity: c.quantity, notes: c.notes || '', price: c.price, image_url: c.image_url || '' };
    });

    var payload = {
      order_id: tempId,
      table_number: state.tableNumber >= 1 && state.tableNumber <= state.maxTables ? state.tableNumber : 0,
      items: orderItems,
      total_price: total,
      status: 'received',
      created_at: timestamp,
    };

    if (!isDemoMode()) {
      var ordersUrl = SUPABASE_URL + '/rest/v1/' + SUPABASE_ORDERS_TABLE;

      var checkUrl = ordersUrl + '?table_number=eq.' + state.tableNumber +
        '&status=neq.paid&status=neq.cancelled' +
        '&order=created_at.desc&limit=1';

      supabaseFetch(checkUrl)
      .then(function (res) { if (!res.ok) throw new Error('Check failed'); return res.json(); })
      .then(function (existing) {
        if (Array.isArray(existing) && existing.length > 0 && existing[0].status === 'received') {
          
          var order = existing[0];
          var mergedItems = JSON.parse(JSON.stringify(orderItems));
          var dbItems = order.items || [];
          mergedItems.forEach(function (item) {
            var dbMatch = dbItems.find(function (di) { return Number(di.id) === Number(item.id); });
            if (dbMatch && dbMatch.notes && !item.notes) {
              item.notes = dbMatch.notes;
            }
          });
          state.cart = mergedItems.map(function (item) {
            return { id: item.id, name: item.name, quantity: Number(item.quantity), notes: item.notes || '', price: item.price, image_url: item.image_url || '' };
          });
          total = calcCartTotal();
          return supabaseFetch(ordersUrl + '?id=eq.' + order.id, {
            method: 'PATCH',
            headers: { 'Prefer': 'return=minimal' },
            body: JSON.stringify({ items: mergedItems, total_price: total }),
          }).then(function () { return String(order.id); });
        } else if (Array.isArray(existing) && existing.length > 0) {
          
          return postNewOrder(ordersUrl, payload);
        } else {
          
          return postNewOrder(ordersUrl, payload);
        }
      })
      .then(function (sequentialId) {
        showOrderSuccess(sequentialId, total);
        state.cart = [];
        updateBottomBar();
        state.isSubmitting = false;
      })
      .catch(function (err) {
        console.error('Supabase order error:', err);
        var fallbackId = String(state.orderCounter + 1);
        state.orderCounter += 1;
        showOrderSuccess(fallbackId, total);
        state.cart = [];
        updateBottomBar();
        state.isSubmitting = false;
      });
    } else {
      var demoId = String(state.orderCounter + 1);
      state.orderCounter += 1;
      showOrderSuccess(demoId, total);
      state.cart = [];
      updateBottomBar();
      state.isSubmitting = false;
    }
  }

  var menuPollTimer = null;

  function startMenuPolling() {
    if (menuPollTimer) return;
    menuPollTimer = setInterval(function () {
      var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_MENU_TABLE +
      '?select=id,name,name_ar,description,description_ar,price,category,secondary_category,image_url,secondary_images_urls,is_best_seller,is_chef_special' +
        '&available=eq.true' +
        '&is_visible=eq.true' +
        '&order=id.asc';

      supabaseFetch(url)
      .then(function (res) {
        if (!res.ok) return null;
        return res.json();
      })
      .then(function (data) {
    if (!Array.isArray(data)) return;
    if (data.length && (typeof data[0].is_best_seller !== 'boolean' || typeof data[0].is_chef_special !== 'boolean')) {
      data = normalizeItemBooleans(data);
    }
    var oldIds = state.menuItems.map(function (i) { return i.id; }).sort().join(',');
        var newIds = data.map(function (i) { return i.id; }).sort().join(',');
        if (oldIds !== newIds) {
          state.menuItems = data;
          state.filteredItems = data;
          applyActiveFilter();
        }
      })
      .catch(function () {});
    }, 15000);
  }

  function stopMenuPolling() {
    if (menuPollTimer) {
      clearInterval(menuPollTimer);
      menuPollTimer = null;
    }
  }

  function showOrderSuccess(orderId, total) {
    var isAddToOrder = !!state.parentOrder;

    state.orderId = orderId;
    state.isOrderPlaced = true;
    state.lastOrder = {
      orderId: orderId,
      total: total,
      items: state.cart.map(function (c) {
        return { id: c.id, name: c.name, nameAr: c.name_ar || '', quantity: c.quantity, notes: c.notes, price: c.price, image_url: c.image_url || '' };
      }),
    };

    dom.orderTableNum.textContent = state.tableNumber >= 1 && state.tableNumber <= state.maxTables ? state.tableNumber : 'hors ligne';

    if (isAddToOrder) {
      dom.orderIdDisplay.textContent = state.parentOrder.orderId + ' + ' + orderId;
      var parentStatus = state.parentOrder.status || 'preparing';
      var parentStepMap = { received: 0, preparing: 1, ready: 2 };
      var pIdx = parentStepMap[parentStatus] !== undefined ? parentStepMap[parentStatus] : 1;
      updateSteps(pIdx);

      var parentHtml = '';
      (state.parentOrder.items || []).forEach(function (c) {
        parentHtml +=
          '<div class="order-details__row">' +
            '<span class="order-details__label">' + c.quantity + 'x ' + escapeHtml(c.name) + '</span>' +
            '<span class="order-details__value">' + formatPrice(c.price * c.quantity) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
      });
      dom.orderDetailsSummary.innerHTML =
        '<div class="order-details__section-title">Commande originale</div>' +
        parentHtml +
        '<div class="order-details__row order-details__row--total">' +
          '<span class="order-details__label">Total</span>' +
          '<span class="order-details__value">' + formatPrice(state.parentOrder.total) + ' ' + CURRENCY_SYMBOL + '</span>' +
        '</div>';

      var childHtml = '';
      state.cart.forEach(function (c) {
        childHtml +=
          '<div class="order-details__row">' +
            '<span class="order-details__label">' + c.quantity + 'x ' + escapeHtml(c.name) + '</span>' +
            '<span class="order-details__value">' + formatPrice(c.price * c.quantity) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
      });
      var newAdditionsEl = document.getElementById('newAdditionsSection');
      if (newAdditionsEl) {
        newAdditionsEl.innerHTML =
          '<div class="order-details__section-title">Nouveaux ajouts</div>' +
          '<div class="new-additions__status">Statut : Reçue</div>' +
          childHtml +
          '<div class="order-details__row order-details__row--total">' +
            '<span class="order-details__label">Total des ajouts</span>' +
            '<span class="order-details__value">' + formatPrice(total) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
        newAdditionsEl.style.display = 'block';
      }
    } else {
      dom.orderIdDisplay.textContent = orderId;
      var itemsHtml = '';
      state.cart.forEach(function (c) {
        itemsHtml +=
          '<div class="order-details__row">' +
            '<span class="order-details__label">' + c.quantity + 'x ' + escapeHtml(c.name) + '</span>' +
            '<span class="order-details__value">' + formatPrice(c.price * c.quantity) + ' ' + CURRENCY_SYMBOL + '</span>' +
          '</div>';
      });
      dom.orderDetailsSummary.innerHTML =
        itemsHtml +
        '<div class="order-details__row order-details__row--total">' +
          '<span class="order-details__label">Total</span>' +
          '<span class="order-details__value">' + formatPrice(total) + ' ' + CURRENCY_SYMBOL + '</span>' +
        '</div>';

      updateSteps(0);
    }

    dom.orderCancelledState.classList.remove('order-modal__cancelled--visible');
    dom.orderActions.classList.remove('order-modal__actions--hidden');
    dom.orderModal.classList.remove('order-modal--cancelled');

    if (!isAddToOrder) {
      updateOrderActions('received');
    } else {
      updateOrderActions(state.parentOrder.status || 'preparing');
    }

    dom.orderModal.classList.add('order-modal--visible');
    document.body.style.overflow = 'hidden';

    createTrackButton();
    updateTrackButtonVisibility();
    if (isAddToOrder && state.parentOrder) {
      startStatusPolling([state.parentOrder.orderId, orderId]);
      subscribeOrderRealtime([state.parentOrder.orderId, orderId]);
    } else {
      startStatusPolling([orderId]);
      subscribeOrderRealtime([orderId]);
    }
  }

  function updateSteps(activeIndex) {
    var steps = dom.stepsContainer.querySelectorAll('.step');
    var SVG_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 inline-block"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    var SVG_POT_PENDING = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 inline-block opacity-50"><path d="M2 12h20M4 12v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 2v4M8 3v3M16 3v3"/></svg>';
    var SVG_POT_ACTIVE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 inline-block animate-bounce"><path d="M2 12h20M4 12v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6M12 2v4M8 3v3M16 3v3"/></svg>';
    var SVG_UTENSILS_PENDING = '<svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 inline-block opacity-50"><path d="M11 2v8c0 1.1-.9 2-2 2H8v10H6V12H5c-1.1 0-2-.9-2-2V2h1v5h1V2h1v5h1V2h1zm8 0c1.66 0 3 1.34 3 3v6h-2v11h-2V11h-2V5c0-1.66 1.34-3 3-3z"/></svg>';
    var SVG_UTENSILS_ACTIVE = '<svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 inline-block ready-utensils-animated"><path d="M11 2v8c0 1.1-.9 2-2 2H8v10H6V12H5c-1.1 0-2-.9-2-2V2h1v5h1V2h1v5h1V2h1zm8 0c1.66 0 3 1.34 3 3v6h-2v11h-2V11h-2V5c0-1.66 1.34-3 3-3z"/></svg>';
    steps.forEach(function (step, i) {
      var circle = step.querySelector('.step__circle');
      step.classList.remove('step--active', 'step--done');
      if (i < activeIndex) {
        step.classList.add('step--done');
        circle.innerHTML = SVG_CHECK;
      } else if (i === activeIndex) {
        step.classList.add('step--active');
        if (i === 0) circle.innerHTML = SVG_CHECK;
        else if (i === 1) circle.innerHTML = SVG_POT_ACTIVE;
        else { circle.innerHTML = SVG_UTENSILS_ACTIVE; step.classList.add('step--done'); }
      } else {
        if (i === 1) circle.innerHTML = SVG_POT_PENDING;
        else if (i === 2) circle.innerHTML = SVG_UTENSILS_PENDING;
      }
    });
  }

  function startStatusPolling(orderIds) {
    if (state.pollingTimer) {
      clearInterval(state.pollingTimer);
    }

    if (typeof orderIds === 'string') orderIds = [orderIds];

    state.pollingTimer = setInterval(function () {
      if (isDemoMode()) {
        simulateStatusUpdate(orderIds[0]);
        return;
      }

      var idsParam = orderIds.map(function (id) { return encodeURIComponent(id); }).join(',');
      var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_ORDERS_TABLE +
        '?order_id=in.(' + idsParam + ')' +
        '&select=order_id,status';

      supabaseFetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!Array.isArray(data)) return;
        var stop = false;
        data.forEach(function (row) {
          updateCustomerTrackingUI(row.status, row.order_id);
          var isParent = state.parentOrder && row.order_id === state.parentOrder.orderId;
          var isSolo = !state.parentOrder;
          if ((isParent || isSolo) && (row.status === 'ready' || row.status === 'paid' || row.status === 'cancelled')) {
            stop = true;
          }
        });
        if (stop) {
          clearInterval(state.pollingTimer);
          state.pollingTimer = null;
        }
      })
      .catch(function (err) {
        console.warn('Status poll error:', err);
      });
    }, ORDER_STATUS_POLL_INTERVAL);

    if (isDemoMode()) {
      simulateStatusUpdate(orderIds[0]);
    }
  }

  var realtimeChannel = null;

  function subscribeOrderRealtime(orderIds) {
    if (isDemoMode() || !SUPABASE_CLIENT) return;
    if (realtimeChannel) {
      SUPABASE_CLIENT.removeChannel(realtimeChannel);
    }
    var idFilter = orderIds.map(function (id) { return 'order_id=eq.' + encodeURIComponent(id); }).join(',');
    realtimeChannel = SUPABASE_CLIENT
      .channel('public:orders')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, function (payload) {
        var row = payload.new;
        if (row && row.order_id && orderIds.indexOf(row.order_id) !== -1) {
          updateCustomerTrackingUI(row.status, row.order_id);
          var isParent = state.parentOrder && row.order_id === state.parentOrder.orderId;
          var isSolo = !state.parentOrder;
          if ((isParent || isSolo) && (row.status === 'ready' || row.status === 'paid' || row.status === 'cancelled')) {
            if (realtimeChannel) {
              SUPABASE_CLIENT.removeChannel(realtimeChannel);
              realtimeChannel = null;
            }
          }
        }
      })
      .subscribe();
  }

  function simulateStatusUpdate(orderId) {
    var steps = dom.stepsContainer.querySelectorAll('.step');
    var currentActive = -1;
    steps.forEach(function (s, i) {
      if (s.classList.contains('step--active')) currentActive = i;
    });

    if (currentActive < 2) {
      setTimeout(function () {
        updateSteps(currentActive + 1);
        if (currentActive + 1 >= 2) {
          clearInterval(state.pollingTimer);
          state.pollingTimer = null;
        }
      }, 6000);
    }
  }

  function updateCustomerTrackingUI(newStatus, orderId) {
    state.orderStatus = newStatus;

    var isParentUpdate = state.parentOrder && orderId === state.parentOrder.orderId;
    var isChildUpdate = state.parentOrder && orderId === state.orderId;

    if (newStatus === 'cancelled') {
      if (isChildUpdate) {
        var newAdditionsEl = document.getElementById('newAdditionsSection');
        if (newAdditionsEl) {
          newAdditionsEl.innerHTML =
            '<div class="order-details__section-title">Nouveaux ajouts</div>' +
            '<div class="order-details__row" style="color:var(--color-error);padding:12px 0;">Ajouts annulés</div>';
        }
        state.orderId = state.parentOrder.orderId;
        state.lastOrder = JSON.parse(JSON.stringify(state.parentOrder));
        dom.orderIdDisplay.textContent = state.parentOrder.orderId;
        dom.cancelOrderBtn.disabled = true;
        return;
      }

      dom.orderCancelledState.classList.add('order-modal__cancelled--visible');
      dom.orderActions.classList.add('order-modal__actions--hidden');
      dom.orderModal.classList.add('order-modal--cancelled');
      if (state.pollingTimer) {
        clearInterval(state.pollingTimer);
        state.pollingTimer = null;
      }
      state.orderId = null;
      state.isOrderPlaced = false;
      state.cart = [];
      updateBottomBar();
      state.parentOrder = null;
      state.menuItems.forEach(function (item) { updateCardCounter(item.id); });
      updateTrackButtonVisibility();
      return;
    }

    if (newStatus === 'paid') {
      if (isChildUpdate) {
        var newAdditionsEl = document.getElementById('newAdditionsSection');
        if (newAdditionsEl) { newAdditionsEl.style.display = 'none'; newAdditionsEl.innerHTML = ''; }
        return;
      }

      saveOrderToHistory();
      dom.orderModal.classList.add('order-modal--fade-out');
      if (dom.trackBtn) dom.trackBtn.classList.add('track-btn--fade-out');
      setTimeout(function () {
        dom.orderModal.classList.remove('order-modal--visible', 'order-modal--fade-out');
        document.body.style.overflow = '';
        if (dom.trackBtn) dom.trackBtn.classList.remove('track-btn--fade-out');
        if (state.pollingTimer) {
          clearInterval(state.pollingTimer);
          state.pollingTimer = null;
        }
        state.cart = [];
        updateBottomBar();
        state.menuItems.forEach(function (item) { updateCardCounter(item.id); });
        state.orderId = null;
        state.isOrderPlaced = false;
        state.parentOrder = null;
        var newAdditionsEl = document.getElementById('newAdditionsSection');
        if (newAdditionsEl) { newAdditionsEl.style.display = 'none'; newAdditionsEl.innerHTML = ''; }
        updateTrackButtonVisibility();
      }, 400);
      return;
    }

    if (isParentUpdate) {
      var statusMap = { received: 0, preparing: 1, ready: 2 };
      var idx = statusMap[newStatus] !== undefined ? statusMap[newStatus] : 0;
      updateSteps(idx);
      updateOrderActions(newStatus);
      return;
    }

    if (isChildUpdate) {
      var newAdditionsEl = document.getElementById('newAdditionsSection');
      if (newAdditionsEl) {
        var statusEl = newAdditionsEl.querySelector('.new-additions__status');
        if (statusEl) {
          var label = newStatus.charAt(0).toUpperCase() + newStatus.slice(1).replace(/_/g, ' ');
          statusEl.textContent = 'Statut : ' + label;
        }
      }
      return;
    }

    var statusMap = { received: 0, preparing: 1, ready: 2 };
    var idx = statusMap[newStatus] !== undefined ? statusMap[newStatus] : 0;
    updateSteps(idx);
    updateOrderActions(newStatus);
  }

  function updateOrderActions(status) {
    if (status === 'preparing' || status === 'ready') {
      dom.cancelOrderBtn.disabled = true;
      dom.editOrderBtn.textContent = 'Ajouter à la commande';
      dom.editOrderBtn.style.background = 'var(--color-success, #22c55e)';
      dom.editOrderBtn.style.color = '#fff';
      dom.editOrderBtn.style.border = 'none';
    } else {
      dom.cancelOrderBtn.disabled = false;
      dom.editOrderBtn.textContent = 'Modifier la commande';
      dom.editOrderBtn.style.background = '';
      dom.editOrderBtn.style.color = '';
      dom.editOrderBtn.style.border = '';
    }
  }

  function cancelOrder() {
    var orderId = state.orderId;
    if (!orderId) return;

    if (state.parentOrder && orderId === state.parentOrder.orderId) {
      dom.cancelOrderBtn.disabled = true;
      return;
    }

    dom.cancelOrderBtn.disabled = true;
    dom.cancelOrderBtn.textContent = 'Annulation...';

    var url = SUPABASE_URL + '/rest/v1/' + SUPABASE_ORDERS_TABLE +
      '?order_id=eq.' + encodeURIComponent(orderId);

    fetch(url, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ status: 'cancelled' }),
    })
    .then(function (res) {
      if (!res.ok) throw new Error('Cancel failed');

      updateCustomerTrackingUI('cancelled', orderId);
    })
    .catch(function () {

      updateCustomerTrackingUI('cancelled', orderId);
    });
  }

  function editOrder() {
    if (state.orderStatus === 'preparing' || state.orderStatus === 'ready') {
      if (!state.parentOrder && state.lastOrder) {
        state.parentOrder = JSON.parse(JSON.stringify(state.lastOrder));
        state.parentOrder.status = state.orderStatus || 'preparing';
      }
      state.orderId = null;
      state.isOrderPlaced = false;
      dom.orderModal.classList.remove('order-modal--visible');
      document.body.style.overflow = '';
      updateTrackButtonVisibility();
      return;
    }

    if (state.lastOrder && state.lastOrder.items) {
      state.cart = state.lastOrder.items.map(function (i) {
        var menuItem = state.menuItems.find(function (m) { return Number(m.id) === Number(i.id); });
        return {
          id: i.id,
          name: i.name,
          nameAr: i.name_ar || '',
          price: i.price,
          quantity: Number(i.quantity),
          notes: i.notes || '',
          image_url: (menuItem && menuItem.image_url) || i.image_url || '',
        };
      });
      state.cart.forEach(function (item) { updateCardCounter(item.id); });
      updateBottomBar();
    }

    dom.orderModal.classList.remove('order-modal--visible');
    document.body.style.overflow = '';
    updateTrackButtonVisibility();
  }

  function createTrackButton() {
    if (dom.trackBtn) return;
    var btn = document.createElement('button');
    btn.id = 'btn-track-live-order';
    btn.innerHTML =
      '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
        '<polyline points="14 2 14 8 20 8"/>' +
        '<line x1="16" y1="13" x2="8" y2="13"/>' +
        '<line x1="16" y1="17" x2="8" y2="17"/>' +
        '<polyline points="10 9 9 9 8 9"/>' +
      '</svg>';
    btn.style.cssText = 'position:fixed;bottom:24px;right:24px;top:auto;left:auto;border:none;width:48px;height:48px;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,0.15);z-index:998;display:none;cursor:pointer;align-items:center;justify-content:center;background:var(--color-accent);color:#fff;transition:opacity 0.3s ease,visibility 0.3s ease;';
    document.body.appendChild(btn);
    dom.trackBtn = btn;
    btn.addEventListener('click', reopenOrderTracking);
  }

  function updateTrackButtonVisibility() {
    if (!dom.trackBtn) return;
    var active = state.orderId && state.isOrderPlaced;
    dom.trackBtn.style.display = active ? 'flex' : 'none';
  }

  function reopenOrderTracking() {
    if (!state.orderId || !state.isOrderPlaced) return;
    dom.orderCancelledState.classList.remove('order-modal__cancelled--visible');
    dom.orderActions.classList.remove('order-modal__actions--hidden');
    dom.orderModal.classList.remove('order-modal--cancelled');
    dom.orderModal.classList.add('order-modal--visible');
    document.body.style.overflow = 'hidden';
  }

  function saveOrderToHistory() {
    if (!state.lastOrder) return;
    state.history.unshift({
      orderId: state.lastOrder.orderId,
      tableNumber: state.tableNumber,
      items: state.lastOrder.items,
      total: state.lastOrder.total,
      status: 'paid',
      timestamp: new Date().toISOString(),
    });
    try { localStorage.setItem('restaurant_history', JSON.stringify(state.history)); } catch (_) {}
  }

  function loadHistory() {
    try {
      var stored = localStorage.getItem('restaurant_history');
      if (stored) { state.history = JSON.parse(stored); if (!Array.isArray(state.history)) state.history = []; }
    } catch (_) { state.history = []; }
  }

  function showHistoryView() {
    state.showHistory = true;
    dom.mainContent.classList.add('main-content--hidden');
    dom.historySection.classList.add('history-section--visible');
    renderHistory();
  }

  function hideHistoryView() {
    state.showHistory = false;
    dom.historySection.classList.remove('history-section--visible');
    dom.mainContent.classList.remove('main-content--hidden');
  }

  function renderHistory() {
    if (!state.history || state.history.length === 0) {
      dom.historyList.innerHTML = '<div class="empty-state"><p class="empty-state__text">Aucune commande passée.</p></div>';
      return;
    }
    var html = '';
    state.history.forEach(function (order) {
      var time = new Date(order.timestamp).toLocaleString();
      var itemsHtml = '';
      order.items.forEach(function (item) {
        itemsHtml += '<div class="history-item__row"><span class="history-item__qty">' + item.quantity + 'x</span><span class="history-item__name">' + escapeHtml(item.name) + '</span><span class="history-item__price">' + formatPrice(item.price * item.quantity) + ' ' + CURRENCY_SYMBOL + '</span></div>';
        if (item.notes) { itemsHtml += '<div class="history-item__note">Note : ' + escapeHtml(item.notes) + '</div>'; }
      });
      html += '<div class="history-card"><div class="history-card__header"><span class="history-card__id">' + escapeHtml(order.orderId) + '</span><span class="history-card__table">' + (order.tableNumber ? 'Table ' + order.tableNumber : 'hors ligne') + '</span><span class="history-card__date">' + time + '</span></div><div class="history-card__body">' + itemsHtml + '</div><div class="history-card__footer"><span class="history-card__total">Total : ' + formatPrice(order.total) + ' ' + CURRENCY_SYMBOL + '</span><span class="badge badge--success">Payé</span></div></div>';
    });
    dom.historyList.innerHTML = html;
  }

  function init() {

    var tableFromURL = getTableFromURL();
    var urlToken = getTokenFromURL();

    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS && tableFromURL > 0) {
      var lockUntilKey = 'table_lock_until_' + tableFromURL;
      var lockUntil = (function () { try { return localStorage.getItem(lockUntilKey); } catch (e) { return null; } })();
      if (lockUntil) {
        if (Date.now() < parseInt(lockUntil, 10)) {
          setTableNumber(tableFromURL);
          showSessionWall();
          return;
        }
        try { localStorage.removeItem(lockUntilKey); } catch (e) {}
        try { localStorage.removeItem('table_locked_' + tableFromURL); } catch (e) {}
        try { localStorage.removeItem('restaurant_session_' + tableFromURL); } catch (e) {}
      }
    }

    if (tableFromURL > 0) {
      var lockedKey = 'table_locked_' + tableFromURL;
      var sessionKey = 'active_session_' + tableFromURL;
      var isLocalLocked = (function () { try { return localStorage.getItem(lockedKey) === 'true'; } catch (e) { return false; } })();
      var isSameSession = (function () { try { return sessionStorage.getItem(sessionKey) === 'true'; } catch (e) { return false; } })();

      if (isLocalLocked) {
        if (isSameSession) {
          setTableNumber(tableFromURL);
          showSessionWall();
          return;
        }
        try { localStorage.removeItem(lockedKey); } catch (e) {}
        try { localStorage.removeItem('restaurant_session_' + tableFromURL); } catch (e) {}
      }
    }

    setTableNumber(tableFromURL);
    dom.isManualMode = tableFromURL === 0;
    if (!dom.isManualMode && dom.changeTableBtn) {
      dom.changeTableBtn.classList.add('hidden');
    }

    function onTableSet() {
      var val = parseInt(dom.tableInput.value, 10);
      if (!isNaN(val) && val >= 1 && val <= state.maxTables) {
        setTableNumber(val);
        if (dom.isManualMode && dom.changeTableBtn) {
          dom.changeTableBtn.classList.remove('hidden');
        }
      }
    }

    dom.tableInput.addEventListener('change', onTableSet);
    dom.tableInput.addEventListener('input', function () {
      if (dom.tableInput.value.length !== 2) return;
      onTableSet();
    });

    if (dom.changeTableBtn) {
      dom.changeTableBtn.addEventListener('click', function () {
        state.tableNumber = 0;
        dom.tableBadge.textContent = 'Table --';
        dom.tableSelector.style.display = 'block';
        dom.tableInput.value = '';
        dom.changeTableBtn.classList.add('hidden');
      });
    }

    loadHistory();

    checkKitchenHours();

    fetchMenuItems();
    fetchMaxTables();

    var tableFromURL = getTableFromURL();
    initSession(tableFromURL);
    startSessionPolling();

    startMenuPolling();

    document.addEventListener('visibilitychange', function () {
      if (document.hidden) { stopMenuPolling(); } else { startMenuPolling(); }
    });

    function closeOrderModal() {
      dom.orderModal.classList.remove('order-modal--visible');
      document.body.style.overflow = '';
    }
    dom.orderModal.addEventListener('click', function (e) {
      if (e.target === dom.orderModal) closeOrderModal();
    });
    dom.cancelledBackBtn.addEventListener('click', closeOrderModal);

    dom.cancelOrderBtn.addEventListener('click', function () {
      dom.cancelConfirm.classList.add('cancel-confirm--visible');
    });
    dom.cancelConfirmBackdrop.addEventListener('click', function () {
      dom.cancelConfirm.classList.remove('cancel-confirm--visible');
    });
    dom.cancelConfirmKeep.addEventListener('click', function () {
      dom.cancelConfirm.classList.remove('cancel-confirm--visible');
    });
    dom.cancelConfirmYes.addEventListener('click', function () {
      dom.cancelConfirm.classList.remove('cancel-confirm--visible');
      cancelOrder();
    });

    dom.orderBannerSend.addEventListener('click', confirmOrder);

    dom.editOrderBtn.addEventListener('click', editOrder);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        dom.orderModal.classList.remove('order-modal--visible');
        document.body.style.overflow = '';
      }
    });

    dom.historyBackBtn.addEventListener('click', hideHistoryView);

    updateBottomBar();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  function dismissSplash() {
    var splashLoader = document.getElementById('appSplashLoader');
    if (splashLoader) {
      setTimeout(function () {
        splashLoader.classList.add('splash-screen-overlay--dismissed');
        setTimeout(function () { if (splashLoader.parentNode) splashLoader.remove(); }, 600);
      }, 3500);
    } else {
      console.error('Critical: #appSplashLoader container element not found in DOM.');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', dismissSplash);
  } else {
    dismissSplash();
  }

})();
</script>

</body>
</html>
